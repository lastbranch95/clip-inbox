<!doctype html>
<html lang="ja">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <title>Clip Inbox</title>

    <link rel="manifest" href="manifest.webmanifest" />
    <link rel="apple-touch-icon" href="assets/apple-touch-icon.png" />
    <meta name="theme-color" content="#111111" />

    <link rel="stylesheet" href="style.css" />

    <!-- Bootstrap Icons：絵文字ではなく環境差の少ないアイコンを使う -->
    <link
      rel="stylesheet"
      href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css"
    />
  </head>

  <body>
    <!-- 上部ヘッダー -->
    <header class="app-header">
      <div class="header-left">
        <button id="settingsButton" class="logo-button">
          <img class="header-logo-icon" src="assets/apple-touch-icon.png" alt="" />
          <span class="header-logo-text">Clip Inbox</span>
        </button>

        <section id="privateModeLabel" class="private-mode-label hidden">
          <span>Private</span>
          <button id="privateModeOffButton">OFF</button>
        </section>
      </div>

      <div class="header-actions">
        <!-- 過去に保存した動画をランダムに掘り返す -->
        <button id="rediscoverButton" class="icon-button" aria-label="掘り返す">
          <i class="bi bi-shuffle"></i>
        </button>

        <button id="refreshButton" class="icon-button" aria-label="更新">
          <i class="bi bi-arrow-clockwise"></i>
        </button>

        <!-- 検索欄の開閉ボタン -->
        <button id="searchToggleButton" class="icon-button" aria-label="検索">
          <i class="bi bi-search"></i>
        </button>
      </div>
    </header>

    <section class="count-bar">
      <p id="countText">0件</p>
    </section>

    <!-- 検索パネル：右上検索アイコンで開閉 -->
    <section id="searchPanel" class="search-panel hidden">
      <input id="searchInput" type="text" placeholder="検索" />
    </section>

    <!-- 設定パネル：普段は非表示 -->
    <section id="settingsPanel" class="settings-panel hidden">
      <h2>設定</h2>

      <section class="sync-panel">
        <h3>同期</h3>
        <p id="syncStatusText">保存先を確認中...</p>

        <input id="authEmailInput" type="email" placeholder="メールアドレス" />
        <input id="authPasswordInput" type="password" placeholder="パスワード" />

        <button id="signInButton">Supabaseにログイン</button>
        <button id="signOutButton" class="hidden">ログアウト</button>
        <button id="importLocalToCloudButton" class="hidden">
          この端末の旧データをクラウドへ移行
        </button>

        <p class="sync-note">Supabase未設定の間は、この端末のIndexedDBに保存します。</p>
      </section>

      <button id="copyJsonButton">JSONをコピー</button>
      <button id="exportButton">JSON書き出し</button>

      <input id="importInput" type="file" accept="application/json" hidden />
      <button id="importButton">JSON読み込み</button>
      <button id="pasteJsonButton">JSON貼り付け読み込み</button>

      <section id="jsonOutputPanel" class="json-output-panel hidden">
        <h3>JSONバックアップ</h3>

        <p id="jsonOutputMessage" class="json-output-message">
          下の欄を全選択してコピーできます。
        </p>

        <textarea id="jsonOutputArea" readonly></textarea>

        <div class="json-output-actions">
          <button id="selectJsonButton">全選択</button>
          <button id="downloadJsonButton">ファイル保存</button>
          <button id="shareJsonButton">共有</button>
          <button id="closeJsonOutputButton" class="sub-button">閉じる</button>
        </div>
      </section>

      <button id="storageCheckButton">保存容量チェック</button>
      <p id="storageText"></p>

      <!-- Private関連 -->
      <button id="privateModeButton">非表示クリップを表示</button>
      <button id="changePasscodeButton">パスコード変更</button>
      <button id="resetAllButton">アプリ内データ全削除</button>
      <button id="closeSettingsButton" class="sub-button">閉じる</button>
    </section>

    <main>
      <!-- 今日の1本：app.js が自動で中身を入れる -->
      <section id="todayPickSection" class="today-pick hidden"></section>

      <!-- YouTube風フィルター -->
      <section class="filter-box">
        <button class="filter-button active" data-filter="all">すべて</button>
        <button class="filter-button" data-filter="unorganized">未整理</button>
        <button class="filter-button" data-filter="stale">放置</button>
        <button class="filter-button" data-filter="watched">視聴済み</button>
        <button class="filter-button" data-filter="expired">期限切れ</button>
        <button class="filter-button" data-filter="tagless">タグなし</button>
        <button class="filter-button" data-filter="favorite">お気に入り</button>
        <button class="filter-button" data-filter="trash">ゴミ箱</button>

        <!-- Privateモード中だけ表示される -->
        <button
          id="privateFilterButton"
          class="filter-button hidden"
          data-filter="private"
        >
          非表示
        </button>
      </section>

      <!-- 並び替え・タグ絞り込み -->
      <section class="control-box">
        <select id="sortSelect">
          <option value="desc">新しい順</option>
          <option value="asc">古い順</option>
        </select>

        <select id="labelSelect">
          <option value="all">すべてのタグ</option>
        </select>
      </section>

      <!-- クリップ一覧：app.js がカードを生成する -->
      <section id="clipList" class="clip-list"></section>
    </main>

    <!-- 新規追加ボタン -->
    <button id="addToggleButton" class="fab">＋</button>

    <!-- 新規追加パネル -->
    <section id="addPanel" class="add-panel hidden">
      <div class="add-panel-inner">
        <h2>新規追加</h2>

        <input id="urlInput" type="url" placeholder="URLを貼る" />
        <input id="reasonInput" type="text" placeholder="保存理由" />
        <input id="tagInput" type="text" placeholder="タグ" />

        <label class="private-check">
          <input id="privateInput" type="checkbox" />
          非表示クリップにする
        </label>

        <button id="saveButton">保存</button>
        <button id="closeAddButton" class="sub-button">閉じる</button>
      </div>
    </section>

    <!-- 三点メニュー：YouTube風の下から出る操作メニュー -->
    <section id="actionSheet" class="action-sheet hidden">
      <div class="action-sheet-backdrop" onclick="closeActionSheet()"></div>

      <div class="action-sheet-panel">
        <div class="action-sheet-handle"></div>

        <button onclick="actionOpenClip()">
          <i class="bi bi-play-circle"></i> 開く
        </button>

        <button onclick="actionShowDetail()">
          <i class="bi bi-info-circle"></i> 詳細
        </button>

        <button onclick="actionSetWatchDue()">
          <i class="bi bi-clock"></i> あとで見る期限
        </button>

        <button onclick="actionEditClip()">
          <i class="bi bi-pencil"></i> 編集
        </button>

        <button onclick="actionToggleFavorite()">
          <i class="bi bi-star"></i> お気に入り切替
        </button>

        <button onclick="actionTogglePrivate()">
          <i class="bi bi-eye-slash"></i> 非表示切替
        </button>

        <button class="danger" onclick="actionDeleteClip()">
          <i class="bi bi-trash"></i> 削除
        </button>

        <button onclick="actionCopyUrl()">
          <i class="bi bi-link-45deg"></i> URLコピー
        </button>

        <button onclick="actionEditTitle()">
          <i class="bi bi-type"></i> タイトル編集
        </button>

        <button class="trash-only" onclick="actionRestoreClip()">
          <i class="bi bi-arrow-counterclockwise"></i> 復元
        </button>

        <button class="danger trash-only" onclick="actionHardDeleteClip()">
          <i class="bi bi-x-circle"></i> 完全削除
        </button>

        <button onclick="closeActionSheet()">閉じる</button>
      </div>
    </section>

    <!-- 詳細モーダル -->
    <section id="detailModal" class="detail-modal hidden">
      <div class="detail-backdrop" onclick="closeDetailModal()"></div>

      <div class="detail-panel">
        <div class="action-sheet-handle"></div>

        <p class="detail-label">タイトル</p>
        <h2 id="detailTitle" class="detail-title"></h2>

        <div class="detail-grid">
          <div>
            <p class="detail-label">理由</p>
            <p id="detailReason" class="detail-value"></p>
          </div>

          <div>
            <p class="detail-label">タグ</p>
            <p id="detailTags" class="detail-value"></p>
          </div>

          <div>
            <p class="detail-label">視聴回数</p>
            <p id="detailWatchCount" class="detail-value"></p>
          </div>

          <div>
            <p class="detail-label">保存日</p>
            <p id="detailCreatedAt" class="detail-value"></p>
          </div>

          <div>
            <p class="detail-label">お気に入り</p>
            <p id="detailFavorite" class="detail-value"></p>
          </div>

          <div>
            <p class="detail-label">削除状態</p>
            <p id="detailDeleted" class="detail-value"></p>
          </div>
        </div>

        <p class="detail-label">URL</p>
        <p id="detailUrl" class="detail-url"></p>

        <div class="detail-actions">
          <button onclick="actionCopyUrl()">URLコピー</button>
          <button class="sub-button" onclick="closeDetailModal()">
            閉じる
          </button>
        </div>
      </div>
    </section>

    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="app.js"></script>
  </body>
</html>
